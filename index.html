<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage Mode - Admin Web Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #060b11;
            color: #e2f1ff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 30px;
        }
        .panel-container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            border-bottom: 2px solid #00f0ff;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        h1 {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(13, 22, 33, 0.75);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        th {
            background-color: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
            font-weight: 600;
        }
        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }
        .badge-subtes {
            background: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="panel-container">
    <header>
        <h1>Sage Mode Monitor Panel</h1>
        <p>Log Aktivitas Simulasi CAT Peserta Terbaru</p>
    </header>

    <table>
        <thead>
            <tr>
                <th>Waktu</th>
                <th>Subtes</th>
                <th>Skor</th>
                <th>Lokasi (IP/Kota)</th>
                <th>Informasi Perangkat (User-Agent)</th>
            </tr>
        </thead>
        <tbody id="panelData">
            <!-- Contoh baris data yang masuk -->
            <tr>
                <td>14/07/2026 22.45</td>
                <td><span class="badge-subtes">TIU</span></td>
                <td><strong>115</strong></td>
                <td>Semarang, Jawa Tengah (IP: 180.244.xxx.xxx)</td>
                <td>Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0...</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
